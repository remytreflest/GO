name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # postgres_integration_test.go skips itself unless DATABASE_URL is set, so
    # this service is what turns that skip into a real run in CI.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mira
          POSTGRES_PASSWORD: mira
          POSTGRES_DB: mira
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mira -d mira"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://mira:mira@localhost:5432/mira?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go fmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Fichiers non formatés (gofmt -l) :"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -cover ./...
